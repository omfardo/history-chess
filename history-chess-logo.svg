<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Background -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DAA520;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bronzeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#CD7F32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B4513;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Ancient column (left side) -->
  <g transform="translate(25, 25)">
    <!-- Column base -->
    <rect x="0" y="60" width="35" height="8" fill="url(#bronzeGradient)" stroke="#8B4513" stroke-width="1"/>
    <!-- Column shaft -->
    <rect x="5" y="20" width="25" height="40" fill="url(#bronzeGradient)" stroke="#8B4513" stroke-width="1"/>
    <!-- Column capital -->
    <path d="M 0 20 L 5 15 L 30 15 L 35 20 Z" fill="url(#bronzeGradient)" stroke="#8B4513" stroke-width="1"/>
    <!-- Column top decoration -->
    <rect x="0" y="15" width="35" height="5" fill="#CD7F32"/>
  </g>
  
  <!-- Chess King piece (center of column) -->
  <g transform="translate(35, 45)">
    <!-- King body -->
    <path d="M 5 5 L 8 20 L 12 25 L 3 25 L 7 20 Z" 
          fill="#1A0F08" 
          stroke="url(#goldGradient)" 
          stroke-width="2"/>
    <!-- Crown -->
    <circle cx="7.5" cy="3" r="3" fill="url(#goldGradient)"/>
    <!-- Cross on top -->
    <rect x="6.5" y="0" width="2" height="6" fill="url(#goldGradient)"/>
    <rect x="4.5" y="2" width="6" height="2" fill="url(#goldGradient)"/>
  </g>
  
  <!-- Game Title -->
  <text x="100" y="50" 
        font-family="Georgia, serif" 
        font-size="42" 
        font-weight="bold" 
        fill="url(#goldGradient)"
        stroke="#1A0F08"
        stroke-width="1">
    HISTORY
  </text>
  
  <text x="100" y="85" 
        font-family="Georgia, serif" 
        font-size="42" 
        font-weight="bold" 
        fill="url(#goldGradient)"
        stroke="#1A0F08"
        stroke-width="1">
    CHESS
  </text>
  
  <!-- Tagline -->
  <text x="102" y="105" 
        font-family="Georgia, serif" 
        font-size="11" 
        font-style="italic"
        fill="#CD7F32"
        letter-spacing="2">
    PLAY THROUGH THE AGES
  </text>
  
  <!-- Ancient scroll decoration (right side) -->
  <g transform="translate(350, 40)">
    <!-- Scroll -->
    <path d="M 0 0 Q 5 10 0 20 Q 10 25 20 20 Q 15 10 20 0 Q 10 -5 0 0 Z" 
          fill="#F4E4C1" 
          stroke="#8B4513" 
          stroke-width="1.5"/>
    <!-- Scroll lines -->
    <line x1="5" y1="8" x2="15" y2="8" stroke="#8B4513" stroke-width="0.5"/>
    <line x1="5" y1="12" x2="15" y2="12" stroke="#8B4513" stroke-width="0.5"/>
  </g>
  
  <!-- Border frame -->
  <rect x="2" y="2" width="396" height="116" 
        fill="none" 
        stroke="url(#goldGradient)" 
        stroke-width="3" 
        rx="8"/>
</svg>
