<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History Chess - Satranç Tarihi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: 'Georgia', serif;
  background: linear-gradient(135deg, #1a1208 0%, #2d1810 100%);
  color: #c9a96e;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

h1{
  font-size: 2.5em;
  margin: 20px 0;
  text-shadow: 0 0 20px rgba(201,169,110,0.5);
}

.controls{
  display: flex;
  gap: 15px;
  margin: 20px 0;
  flex-wrap: wrap;
  justify-content: center;
}

button{
  background: linear-gradient(135deg, #9370DB, #8A2BE2);
  color: white;
  border: none;
  padding: 15px 30px;
  font-size: 18px;
  cursor: pointer;
  border-radius: 12px;
  font-weight: bold;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(147,112,219,0.4);
}

button:hover{
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(147,112,219,0.6);
}

button:active{
  transform: translateY(0);
}

.active-svg{
  background: linear-gradient(135deg, #32CD32, #228B22) !important;
  box-shadow: 0 4px 15px rgba(50,205,50,0.4);
}

#status{
  margin: 20px 0;
  font-size: 24px;
  color: #FFD700;
  text-shadow: 0 0 10px rgba(255,215,0,0.5);
  font-weight: bold;
}

#board-container{
  perspective: 1000px;
}

#board{
  border-collapse: collapse;
  box-shadow: 0 0 40px rgba(255,215,0,0.4);
  border: 4px solid #8B7355;
  animation: boardGlow 2s ease-in-out infinite alternate;
}

@keyframes boardGlow{
  from{ box-shadow: 0 0 30px rgba(255,215,0,0.3); }
  to{ box-shadow: 0 0 50px rgba(255,215,0,0.5); }
}

#board td{
  width: 85px;
  height: 85px;
  text-align: center;
  vertical-align: middle;
  font-size: 60px;
  cursor: pointer;
  position: relative;
  transition: all 0.2s ease;
}

#board td:hover{
  transform: scale(1.05);
  z-index: 10;
  box-shadow: inset 0 0 20px rgba(255,215,0,0.4);
}

.light-square{ 
  background: #f0d9b5;
}

.dark-square{ 
  background: #b58863;
}

.selected{
  background: #FFD700 !important;
  box-shadow: inset 0 0 30px rgba(255,215,0,0.8);
}

.legal-move{
  background: #90EE90 !important;
  cursor: pointer;
}

.legal-move::after{
  content: '';
  position: absolute;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: rgba(0,100,0,0.5);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* SVG TAŞLAR - TAM BOYUT! */
.svg-piece{
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 8px;
  display: block;
}

.svg-piece:hover{
  filter: brightness(1.1);
}

/* Unicode taşlar için stil */
.unicode-piece{
  font-size: 60px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

.white-piece{
  color: #fff;
  text-shadow: -1px -1px 2px #000, 1px -1px 2px #000, -1px 1px 2px #000, 1px 1px 2px #000;
}

.black-piece{
  color: #222;
  text-shadow: -1px -1px 2px #fff, 1px -1px 2px #fff, -1px 1px 2px #fff, 1px 1px 2px #fff;
}

@media (max-width: 768px){
  #board td{
    width: 45px;
    height: 45px;
    font-size: 30px;
  }
  h1{ font-size: 1.5em; }
  button{ padding: 10px 20px; font-size: 14px; }
}
</style>
</head>
<body>

<h1>🏛️ History Chess - Satranç Tarihi</h1>

<div class="controls">
  <button onclick="yeniOyun()">⚔️ Yeni Oyun</button>
  <button onclick="tasTipiDegistir()" id="btn-tas-tipi">🎨 SVG Taşlar</button>
</div>

<div id="status">Beyazın sırası!</div>

<div id="board-container">
  <table id="board"></table>
</div>

<script>
var W='w', B='b';
var tahta=[];
var secilenKare=null;
var simdikiSira=W;

// Unicode taşlar
var UNICODE_TASLAR={
  w:{K:'♚',Q:'♛',R:'♜',B:'♝',N:'♞',P:'♟'},
  b:{K:'♔',Q:'♕',R:'♖',B:'♗',N:'♘',P:'♙'}
};

// SVG TAŞLAR
var tasTipi='unicode';
var SVG_TASLAR={
  roma:{
    K:'icons/roma/king.jpg',
    Q:'icons/roma/queen.jpg',
    R:'icons/roma/rook.jpg',
    B:'icons/roma/bishop.jpg',
    N:'icons/roma/knight.jpg',
    P:'icons/roma/pawn.jpg'
  },
  misir:{
    K:'icons/misir/king.jpg',
    Q:'icons/misir/queen.jpg',
    R:'icons/misir/rook.jpg',
    B:'icons/misir/bishop.jpg',
    N:'icons/misir/knight.jpg',
    P:'icons/misir/pawn.jpg'
  }
};

var beyazUygarlik='roma';
var siyahUygarlik='misir';

// Taş göster
function tasGoster(tas){
  if(tasTipi==='svg'){
    var uyg=tas.r===W?beyazUygarlik:siyahUygarlik;
    if(SVG_TASLAR[uyg]){
      var className=tas.r===W?'svg-piece white-piece':'svg-piece black-piece';
      return '<img src="'+SVG_TASLAR[uyg][tas.t]+'" class="'+className+'" alt="'+tas.t+'" draggable="false">';
    }
  }
  
  var className='unicode-piece '+(tas.r===W?'white-piece':'black-piece');
  return '<span class="'+className+'">'+UNICODE_TASLAR[tas.r][tas.t]+'</span>';
}

// Taş tipi değiştir
function tasTipiDegistir(){
  tasTipi=(tasTipi==='unicode')?'svg':'unicode';
  localStorage.setItem('tasTipi',tasTipi);
  
  var btn=document.getElementById('btn-tas-tipi');
  if(tasTipi==='svg'){
    btn.textContent='🎨 SVG Taşlar ✓';
    btn.className='active-svg';
    document.getElementById('status').textContent='SVG Taşlar Aktif! ✨';
  }else{
    btn.textContent='🎨 SVG Taşlar';
    btn.className='';
    document.getElementById('status').textContent='Unicode Taşlar Aktif!';
  }
  
  tahtaCiz();
  setTimeout(function(){
    document.getElementById('status').textContent=(simdikiSira===W?'Beyazın':'Siyahın')+' sırası!';
  },2000);
}

// Tahta başlat
function tahtaBaslat(){
  tahta=[];
  for(var i=0;i<8;i++){
    tahta[i]=[];
    for(var j=0;j<8;j++){
      tahta[i][j]=null;
    }
  }
  
  var siralam=[{t:'R'},{t:'N'},{t:'B'},{t:'Q'},{t:'K'},{t:'B'},{t:'N'},{t:'R'}];
  
  for(var j=0;j<8;j++){
    tahta[0][j]={t:siralam[j].t,r:B};
    tahta[1][j]={t:'P',r:B};
    tahta[6][j]={t:'P',r:W};
    tahta[7][j]={t:siralam[j].t,r:W};
  }
  
  simdikiSira=W;
  secilenKare=null;
}

// Tahtayı çiz
function tahtaCiz(){
  var html='';
  for(var i=0;i<8;i++){
    html+='<tr>';
    for(var j=0;j<8;j++){
      var kareRenk=(i+j)%2===0?'light-square':'dark-square';
      var tas=tahta[i][j];
      var icerik=tas?tasGoster(tas):'';
      html+='<td class="'+kareRenk+'" onclick="kareTiklandi('+i+','+j+')">'+icerik+'</td>';
    }
    html+='</tr>';
  }
  document.getElementById('board').innerHTML=html;
}

// Kare tıklandı
function kareTiklandi(satir,sutun){
  var tas=tahta[satir][sutun];
  
  // Eğer bir taş seçiliyse
  if(secilenKare){
    // Hamle yap
    if(gecerliHarekeMi(secilenKare.s,secilenKare.su,satir,sutun)){
      tahta[satir][sutun]=tahta[secilenKare.s][secilenKare.su];
      tahta[secilenKare.s][secilenKare.su]=null;
      simdikiSira=(simdikiSira===W)?B:W;
      document.getElementById('status').textContent=(simdikiSira===W?'Beyazın':'Siyahın')+' sırası!';
    }
    secilenKare=null;
    tahtaCiz();
  }
  // Taş seç
  else if(tas && tas.r===simdikiSira){
    secilenKare={s:satir,su:sutun};
    tahtaCiz();
    // Seçili kareyi vurgula
    var board=document.getElementById('board');
    var td=board.rows[satir].cells[sutun];
    td.classList.add('selected');
  }
}

// Geçerli hareket mi (basit kontrol)
function gecerliHarekeMi(s1,su1,s2,su2){
  var tas=tahta[s1][su1];
  var hedef=tahta[s2][su2];
  
  // Kendi taşına gidemez
  if(hedef && hedef.r===tas.r) return false;
  
  var ds=Math.abs(s2-s1);
  var dsu=Math.abs(su2-su1);
  
  // Basit hareket kuralları
  if(tas.t==='P'){
    // Piyon ileri gider
    if(tas.r===W && s2<s1 && su1===su2 && !hedef) return true;
    if(tas.r===B && s2>s1 && su1===su2 && !hedef) return true;
    // Çapraz yeme
    if(ds===1 && dsu===1 && hedef && hedef.r!==tas.r) return true;
  }
  if(tas.t==='R'){
    // Kale düz gider
    if(s1===s2 || su1===su2) return true;
  }
  if(tas.t==='N'){
    // At L şeklinde
    if((ds===2&&dsu===1)||(ds===1&&dsu===2)) return true;
  }
  if(tas.t==='B'){
    // Fil çapraz
    if(ds===dsu) return true;
  }
  if(tas.t==='Q'){
    // Vezir her yöne
    if(s1===s2||su1===su2||ds===dsu) return true;
  }
  if(tas.t==='K'){
    // Şah 1 kare
    if(ds<=1&&dsu<=1) return true;
  }
  
  return false;
}

// Yeni oyun
function yeniOyun(){
  tahtaBaslat();
  tahtaCiz();
  document.getElementById('status').textContent='Yeni oyun başladı! ⚔️';
  setTimeout(function(){
    document.getElementById('status').textContent='Beyazın sırası!';
  },2000);
}

// Sayfa yüklenince
window.onload=function(){
  if(localStorage.getItem('tasTipi')){
    tasTipi=localStorage.getItem('tasTipi');
    if(tasTipi==='svg'){
      var btn=document.getElementById('btn-tas-tipi');
      btn.textContent='🎨 SVG Taşlar ✓';
      btn.className='active-svg';
    }
  }
  yeniOyun();
};
</script>

</body>
</html>
