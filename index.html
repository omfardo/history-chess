<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History Chess - Play Through The Ages</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: 'Georgia', serif;
  background: #0a0604;
  color: #c9a96e;
  overflow-x: hidden;
}

/* HERO SECTION */
.hero{
  position: relative;
  width: 100%;
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.hero-image{
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
  animation: fadeIn 1.5s ease-in;
}

.hero-overlay{
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 100%);
}

.hero-content{
  position: relative;
  z-index: 10;
  text-align: center;
  color: #fff;
  animation: slideUp 1s ease-out 0.5s both;
}

.hero-content h1{
  font-size: 5em;
  font-weight: bold;
  text-shadow: 0 0 30px rgba(201,169,110,0.8), 0 0 60px rgba(255,215,0,0.6);
  margin-bottom: 20px;
  letter-spacing: 3px;
}

.hero-content p{
  font-size: 2em;
  color: #FFD700;
  text-shadow: 0 0 20px rgba(255,215,0,0.8);
  margin-bottom: 40px;
  font-style: italic;
}

.btn-play{
  background: linear-gradient(135deg, #FFD700, #FFA500);
  color: #1a0f08;
  border: none;
  padding: 20px 60px;
  font-size: 1.8em;
  font-weight: bold;
  cursor: pointer;
  border-radius: 50px;
  box-shadow: 0 10px 40px rgba(255,215,0,0.5);
  transition: all 0.3s ease;
  text-transform: uppercase;
  letter-spacing: 2px;
}

.btn-play:hover{
  transform: translateY(-5px) scale(1.05);
  box-shadow: 0 15px 60px rgba(255,215,0,0.8);
  background: linear-gradient(135deg, #FFA500, #FFD700);
}

.scroll-hint{
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  animation: bounce 2s infinite;
  color: #FFD700;
  font-size: 2em;
}

@keyframes fadeIn{
  from{ opacity: 0; }
  to{ opacity: 1; }
}

@keyframes slideUp{
  from{ opacity: 0; transform: translateY(50px); }
  to{ opacity: 1; transform: translateY(0); }
}

@keyframes bounce{
  0%, 20%, 50%, 80%, 100%{ transform: translateX(-50%) translateY(0); }
  40%{ transform: translateX(-50%) translateY(-20px); }
  60%{ transform: translateX(-50%) translateY(-10px); }
}

/* GAME SECTION WITH EPIC ARENA BACKGROUND */
.game-section{
  min-height: 100vh;
  background-image: url('textures/arena-background.jpg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  padding: 60px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

/* Dark overlay for better contrast */
.game-section::after{
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
  pointer-events: none;
  z-index: 0;
}

/* Smoke/dust particles effect */
.game-section::before{
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: 
    radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.1), transparent),
    radial-gradient(2px 2px at 60% 70%, rgba(255,255,255,0.08), transparent),
    radial-gradient(1px 1px at 50% 50%, rgba(255,255,255,0.06), transparent);
  background-size: 200px 200px, 300px 300px, 150px 150px;
  animation: dust 20s linear infinite;
  pointer-events: none;
  opacity: 0.3;
}

@keyframes dust{
  0%{ background-position: 0 0, 0 0, 0 0; }
  100%{ background-position: 200px 200px, -300px 300px, 150px -150px; }
}

.game-title{
  font-size: 3em;
  margin-bottom: 40px;
  text-shadow: 0 0 20px rgba(201,169,110,0.5);
  text-align: center;
  position: relative;
  z-index: 1;
}

.controls{
  display: flex;
  gap: 15px;
  margin-bottom: 30px;
  flex-wrap: wrap;
  justify-content: center;
  position: relative;
  z-index: 1;
}

button{
  background: linear-gradient(135deg, #9370DB, #8A2BE2);
  color: white;
  border: none;
  padding: 15px 30px;
  font-size: 18px;
  cursor: pointer;
  border-radius: 12px;
  font-weight: bold;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(147,112,219,0.4);
}

button:hover{
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(147,112,219,0.6);
}

.active-svg{
  background: linear-gradient(135deg, #32CD32, #228B22) !important;
}

#status{
  margin: 20px 0;
  font-size: 24px;
  color: #FFD700;
  text-shadow: 0 0 10px rgba(255,215,0,0.5);
  font-weight: bold;
  position: relative;
  z-index: 1;
}

/* EPIC BOARD STYLING */
#board-container{
  perspective: 1200px;
  filter: drop-shadow(0 20px 60px rgba(0,0,0,0.8));
  position: relative;
  z-index: 1;
}

#board{
  border-collapse: collapse;
  background: 
    linear-gradient(45deg, rgba(139,115,85,0.2) 0%, transparent 100%),
    radial-gradient(ellipse at center, rgba(255,215,0,0.1) 0%, transparent 70%);
  box-shadow: 
    0 0 80px rgba(255,215,0,0.4),
    inset 0 0 100px rgba(0,0,0,0.6);
  border: 6px solid #5c4a3a;
  position: relative;
  animation: boardGlow 3s ease-in-out infinite alternate;
}

@keyframes boardGlow{
  from{ box-shadow: 0 0 60px rgba(255,215,0,0.3), inset 0 0 100px rgba(0,0,0,0.6); }
  to{ box-shadow: 0 0 100px rgba(255,215,0,0.5), inset 0 0 100px rgba(0,0,0,0.6); }
}

#board td{
  width: 95px;
  height: 95px;
  padding: 0;
  margin: 0;
  text-align: center;
  vertical-align: middle;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
  border: 1px solid rgba(0,0,0,0.2);
}

/* EPIC WEATHERED STONE TEXTURE SQUARES */
.light-square{
  background-image: url('textures/light-square.jpg');
  background-size: cover;
  background-position: center;
  box-shadow: 
    inset 2px 2px 4px rgba(0,0,0,0.15),
    inset -2px -2px 4px rgba(255,255,255,0.1);
}

.dark-square{
  background-image: url('textures/dark-square.jpg');
  background-size: cover;
  background-position: center;
  box-shadow: 
    inset 2px 2px 4px rgba(0,0,0,0.3),
    inset -2px -2px 4px rgba(255,255,255,0.05);
}

#board td:hover{
  filter: brightness(1.15);
  transform: scale(1.02);
  z-index: 5;
}

.selected{
  background: 
    radial-gradient(ellipse at center, #FFD700 0%, #FFA500 100%) !important;
  box-shadow: 
    inset 0 0 30px rgba(255,215,0,0.8),
    0 0 30px rgba(255,215,0,0.6) !important;
  animation: pulse 0.5s ease-in-out;
}

@keyframes pulse{
  0%, 100%{ transform: scale(1); }
  50%{ transform: scale(1.05); }
}

/* EPIC PIECE STYLING */
.svg-piece{
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  padding: 2px;
  filter: 
    drop-shadow(0 8px 16px rgba(0,0,0,0.7))
    drop-shadow(0 0 8px rgba(255,215,0,0.2));
  transition: all 0.3s ease;
  animation: pieceAppear 0.4s ease-out;
}

@keyframes pieceAppear{
  from{
    opacity: 0;
    transform: scale(0.8) translateY(-20px);
  }
  to{
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

.svg-piece:hover{
  filter: 
    drop-shadow(0 12px 24px rgba(0,0,0,0.9))
    drop-shadow(0 0 20px rgba(255,215,0,0.6))
    brightness(1.1);
  transform: translateY(-8px) scale(1.08);
  cursor: grab;
}

.svg-piece:active{
  cursor: grabbing;
  transform: translateY(-4px) scale(1.05);
}

/* Unicode pieces styling */
.unicode-piece{
  font-size: 65px;
  display: inline-block;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
  transition: all 0.3s ease;
}

.unicode-piece:hover{
  filter: drop-shadow(0 8px 16px rgba(0,0,0,0.8));
  transform: scale(1.1);
}

.white-piece{
  color: #fff;
  text-shadow: 
    -2px -2px 3px #000, 2px -2px 3px #000, 
    -2px 2px 3px #000, 2px 2px 3px #000,
    0 0 10px rgba(255,255,255,0.5);
}

.black-piece{
  color: #1a1208;
  text-shadow: 
    -1px -1px 2px #fff, 1px -1px 2px #fff, 
    -1px 1px 2px #fff, 1px 1px 2px #fff,
    0 0 8px rgba(0,0,0,0.3);
}

/* RESPONSIVE */
@media (max-width: 768px){
  .hero-content h1{ font-size: 2.5em; }
  .hero-content p{ font-size: 1.2em; }
  .btn-play{ padding: 15px 40px; font-size: 1.2em; }
  .game-title{ font-size: 2em; }
  #board td{ width: 50px; height: 50px; }
  .unicode-piece{ font-size: 35px; }
  button{ padding: 10px 20px; font-size: 14px; }
}
</style>
</head>
<body>

<!-- HERO SECTION -->
<section class="hero">
  <img src="hero-image.png" alt="History Chess" class="hero-image">
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <h1>⚔️ HISTORY CHESS ⚔️</h1>
    <p>Play Through The Ages</p>
  </div>
  <div class="scroll-hint">▼</div>
</section>

<!-- GAME SECTION -->
<section class="game-section" id="game">
  <h2 class="game-title">🏛️ Choose Your Civilization</h2>
  
  <div class="controls">
    <button id="btn-yeni">⚔️ Yeni Oyun</button>
    <button id="btn-svg">🎨 SVG Taşlar</button>
  </div>

  <div id="status">Beyazın sırası!</div>

  <div id="board-container">
    <table id="board"></table>
  </div>
</section>

<script>
var W='w',B='b';
var tahta=[];
var secilenKare=null;
var simdikiSira=W;

var UNICODE={
  w:{K:'♚',Q:'♛',R:'♜',B:'♝',N:'♞',P:'♟'},
  b:{K:'♔',Q:'♕',R:'♖',B:'♗',N:'♘',P:'♙'}
};

var tasTipi='unicode';
var SVG_TASLAR={
  roma:{
    K:'icons/roma/king.jpg',
    Q:'icons/roma/queen.jpg',
    R:'icons/roma/rook.jpg',
    B:'icons/roma/bishop.jpg',
    N:'icons/roma/knight.jpg',
    P:'icons/roma/pawn.jpg'
  },
  misir:{
    K:'icons/misir/king.jpg',
    Q:'icons/misir/queen.jpg',
    R:'icons/misir/rook.jpg',
    B:'icons/misir/bishop.jpg',
    N:'icons/misir/knight.jpg',
    P:'icons/misir/pawn.jpg'
  }
};

var beyazUyg='roma';
var siyahUyg='misir';

function scrollToGame(){
  document.getElementById('game').scrollIntoView({behavior:'smooth'});
}

function tasHTML(tas){
  if(tasTipi==='svg'){
    var uyg=tas.r===W?beyazUyg:siyahUyg;
    if(SVG_TASLAR[uyg]){
      return '<img src="'+SVG_TASLAR[uyg][tas.t]+'" class="svg-piece" draggable="false">';
    }
  }
  var cls='unicode-piece '+(tas.r===W?'white-piece':'black-piece');
  return '<span class="'+cls+'">'+UNICODE[tas.r][tas.t]+'</span>';
}

function tahtaBaslat(){
  tahta=[];
  for(var i=0;i<8;i++){
    tahta[i]=[];
    for(var j=0;j<8;j++) tahta[i][j]=null;
  }
  
  var sira=['R','N','B','Q','K','B','N','R'];
  for(var j=0;j<8;j++){
    tahta[0][j]={t:sira[j],r:B};
    tahta[1][j]={t:'P',r:B};
    tahta[6][j]={t:'P',r:W};
    tahta[7][j]={t:sira[j],r:W};
  }
  
  simdikiSira=W;
  secilenKare=null;
}

function tahtaCiz(){
  var html='';
  for(var i=0;i<8;i++){
    html+='<tr>';
    for(var j=0;j<8;j++){
      var renk=(i+j)%2===0?'light-square':'dark-square';
      var tas=tahta[i][j];
      var icerik=tas?tasHTML(tas):'';
      html+='<td class="'+renk+'" data-s="'+i+'" data-su="'+j+'">'+icerik+'</td>';
    }
    html+='</tr>';
  }
  document.getElementById('board').innerHTML=html;
  
  var cells=document.querySelectorAll('#board td');
  cells.forEach(function(cell){
    cell.addEventListener('click',function(){
      var s=parseInt(this.getAttribute('data-s'));
      var su=parseInt(this.getAttribute('data-su'));
      kareTiklandi(s,su);
    });
  });
}

function kareTiklandi(s,su){
  var tas=tahta[s][su];
  
  if(secilenKare){
    if(s===secilenKare.s && su===secilenKare.su){
      secilenKare=null;
    }else if(gecerliMi(secilenKare.s,secilenKare.su,s,su)){
      tahta[s][su]=tahta[secilenKare.s][secilenKare.su];
      tahta[secilenKare.s][secilenKare.su]=null;
      simdikiSira=(simdikiSira===W)?B:W;
      secilenKare=null;
      tahtaCiz();
      document.getElementById('status').textContent=(simdikiSira===W?'Beyazın':'Siyahın')+' sırası!';
      return;
    }else{
      secilenKare=null;
    }
  }
  
  if(tas && tas.r===simdikiSira){
    secilenKare={s:s,su:su};
    tahtaCiz();
    var board=document.getElementById('board');
    board.rows[s].cells[su].classList.add('selected');
  }else{
    tahtaCiz();
  }
}

function gecerliMi(s1,su1,s2,su2){
  var tas=tahta[s1][su1];
  var hedef=tahta[s2][su2];
  
  if(!tas) return false;
  if(hedef && hedef.r===tas.r) return false;
  
  var ds=s2-s1;
  var dsu=su2-su1;
  var ads=Math.abs(ds);
  var adsu=Math.abs(dsu);
  
  if(tas.t==='P'){
    if(tas.r===W){
      if(ds===-1 && dsu===0 && !hedef) return true;
      if(s1===6 && ds===-2 && dsu===0 && !hedef && !tahta[5][su1]) return true;
      if(ds===-1 && adsu===1 && hedef) return true;
    }else{
      if(ds===1 && dsu===0 && !hedef) return true;
      if(s1===1 && ds===2 && dsu===0 && !hedef && !tahta[2][su1]) return true;
      if(ds===1 && adsu===1 && hedef) return true;
    }
  }
  if(tas.t==='R') return (ds===0 || dsu===0);
  if(tas.t==='N') return (ads===2 && adsu===1)||(ads===1 && adsu===2);
  if(tas.t==='B') return ads===adsu && ads>0;
  if(tas.t==='Q') return (ds===0||dsu===0||ads===adsu);
  if(tas.t==='K') return ads<=1 && adsu<=1;
  
  return false;
}

function yeniOyun(){
  tahtaBaslat();
  tahtaCiz();
  document.getElementById('status').textContent='Yeni oyun başladı! ⚔️';
  setTimeout(function(){
    document.getElementById('status').textContent='Beyazın sırası!';
  },1500);
}

function svgDegistir(){
  tasTipi=(tasTipi==='unicode')?'svg':'unicode';
  localStorage.setItem('tasTipi',tasTipi);
  
  var btn=document.getElementById('btn-svg');
  if(tasTipi==='svg'){
    btn.textContent='🎨 SVG Taşlar ✓';
    btn.className='active-svg';
  }else{
    btn.textContent='🎨 SVG Taşlar';
    btn.className='';
  }
  
  tahtaCiz();
}

window.onload=function(){
  if(localStorage.getItem('tasTipi')){
    tasTipi=localStorage.getItem('tasTipi');
    if(tasTipi==='svg'){
      document.getElementById('btn-svg').textContent='🎨 SVG Taşlar ✓';
      document.getElementById('btn-svg').className='active-svg';
    }
  }
  
  document.getElementById('btn-yeni').addEventListener('click',yeniOyun);
  document.getElementById('btn-svg').addEventListener('click',svgDegistir);
  
  yeniOyun();
};
</script>

</body>
</html>
