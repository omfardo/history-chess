<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History Chess - Roma Test</title>
<style>
body{
  font-family: serif;
  background: linear-gradient(135deg, #1a1208 0%, #2d1810 100%);
  color: #c9a96e;
  margin: 0;
  padding: 20px;
  text-align: center;
}

#board{
  margin: 20px auto;
  border-collapse: collapse;
  box-shadow: 0 0 30px rgba(255,215,0,0.3);
}

#board td{
  width: 60px;
  height: 60px;
  text-align: center;
  vertical-align: middle;
  font-size: 40px;
  cursor: pointer;
}

.light-square{ background: #f0d9b5; }
.dark-square{ background: #b58863; }

.svg-piece{
  width: 100%;
  height: 100%;
  max-width: 55px;
  max-height: 55px;
  object-fit: contain;
}

button{
  background: linear-gradient(135deg, #9370DB, #8A2BE2);
  color: white;
  border: none;
  padding: 12px 24px;
  margin: 5px;
  font-size: 16px;
  cursor: pointer;
  border-radius: 8px;
}

button:hover{
  transform: scale(1.05);
}

.active-svg{
  background: linear-gradient(135deg, #32CD32, #228B22) !important;
}

#status{
  margin: 20px;
  font-size: 20px;
  color: #FFD700;
}
</style>
</head>
<body>

<h1>🏛️ History Chess - Roma Test</h1>

<div>
  <button onclick="newGame()">⚔️ New Game</button>
  <button onclick="togglePieceType()" id="btn-piece-type">🎨 SVG Pieces</button>
</div>

<div id="status">Your turn!</div>

<table id="board"></table>

<script>
// Chess board (8x8)
var W='w', B='b';
var board=[];

// Unicode pieces
var PIECES={w:{K:'♚',Q:'♛',R:'♜',B:'♝',N:'♞',P:'♟'},b:{K:'♔',Q:'♕',R:'♖',B:'♗',N:'♘',P:'♙'}};

// SVG PIECES - ONLY ROMA FOR TEST!
var pieceType='unicode'; // 'unicode' or 'svg'
var SVG_PIECES={
  roma:{
    K:'icons/roma/king.jpg',
    Q:'icons/roma/queen.jpg',
    R:'icons/roma/rook.jpg',
    B:'icons/roma/bishop.jpg',
    N:'icons/roma/knight.jpg',
    P:'icons/roma/pawn.jpg'
  }
};

// Civilizations
var whiteCiv='roma';
var blackCiv='egypt'; // Not yet available, will use unicode

// Show piece function
function showPiece(piece){
  if(pieceType==='svg'){
    var civ=piece.c===W?whiteCiv:blackCiv;
    if(SVG_PIECES[civ]){
      return '<img src="'+SVG_PIECES[civ][piece.t]+'" class="svg-piece" alt="'+piece.t+'">';
    }
  }
  // Unicode fallback
  var colorStyle=piece.c===W?'color:#fff;text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000;':'color:#222;text-shadow:-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff,1px 1px 0 #fff;';
  return '<span style="'+colorStyle+'">'+PIECES[piece.c][piece.t]+'</span>';
}

// Toggle piece type
function togglePieceType(){
  pieceType=(pieceType==='unicode')?'svg':'unicode';
  localStorage.setItem('pieceType',pieceType);
  drawBoard();
  
  var btn=document.getElementById('btn-piece-type');
  if(pieceType==='svg'){
    btn.textContent='🎨 SVG Pieces ✓';
    btn.className='active-svg';
    document.getElementById('status').textContent='SVG Pieces Active! ✅';
  }else{
    btn.textContent='🎨 SVG Pieces';
    btn.className='';
    document.getElementById('status').textContent='Unicode Pieces Active!';
  }
}

// Initialize board
function initBoard(){
  board=[];
  for(var i=0;i<8;i++){
    board[i]=[];
    for(var j=0;j<8;j++){
      board[i][j]=null;
    }
  }
  
  // Black pieces
  board[0][0]={t:'R',c:B};
  board[0][1]={t:'N',c:B};
  board[0][2]={t:'B',c:B};
  board[0][3]={t:'Q',c:B};
  board[0][4]={t:'K',c:B};
  board[0][5]={t:'B',c:B};
  board[0][6]={t:'N',c:B};
  board[0][7]={t:'R',c:B};
  for(var j=0;j<8;j++){
    board[1][j]={t:'P',c:B};
  }
  
  // White pieces
  for(var j=0;j<8;j++){
    board[6][j]={t:'P',c:W};
  }
  board[7][0]={t:'R',c:W};
  board[7][1]={t:'N',c:W};
  board[7][2]={t:'B',c:W};
  board[7][3]={t:'Q',c:W};
  board[7][4]={t:'K',c:W};
  board[7][5]={t:'B',c:W};
  board[7][6]={t:'N',c:W};
  board[7][7]={t:'R',c:W};
}

// Draw board
function drawBoard(){
  var html='';
  for(var i=0;i<8;i++){
    html+='<tr>';
    for(var j=0;j<8;j++){
      var sqColor=(i+j)%2===0?'light-square':'dark-square';
      var piece=board[i][j];
      var content=piece?showPiece(piece):'';
      html+='<td class="'+sqColor+'">'+content+'</td>';
    }
    html+='</tr>';
  }
  document.getElementById('board').innerHTML=html;
}

// New game
function newGame(){
  initBoard();
  drawBoard();
  document.getElementById('status').textContent='New game started! 🏛️';
}

// On page load
window.onload=function(){
  // Load piece type preference
  if(localStorage.getItem('pieceType')){
    pieceType=localStorage.getItem('pieceType');
    if(pieceType==='svg'){
      var btn=document.getElementById('btn-piece-type');
      btn.textContent='🎨 SVG Pieces ✓';
      btn.className='active-svg';
    }
  }
  
  newGame();
};
</script>

</body>
</html>
