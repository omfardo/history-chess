<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History Chess</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: 'Georgia', serif;
  background: linear-gradient(135deg, #1a1208 0%, #2d1810 100%);
  color: #c9a96e;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

h1{
  font-size: 2.5em;
  margin: 20px 0;
  text-shadow: 0 0 20px rgba(201,169,110,0.5);
}

.controls{
  display: flex;
  gap: 15px;
  margin: 20px 0;
  flex-wrap: wrap;
  justify-content: center;
}

button{
  background: linear-gradient(135deg, #9370DB, #8A2BE2);
  color: white;
  border: none;
  padding: 15px 30px;
  font-size: 18px;
  cursor: pointer;
  border-radius: 12px;
  font-weight: bold;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(147,112,219,0.4);
}

button:hover{
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(147,112,219,0.6);
}

.active-svg{
  background: linear-gradient(135deg, #32CD32, #228B22) !important;
}

#status{
  margin: 20px 0;
  font-size: 24px;
  color: #FFD700;
  text-shadow: 0 0 10px rgba(255,215,0,0.5);
  font-weight: bold;
}

#board{
  border-collapse: collapse;
  box-shadow: 0 0 40px rgba(255,215,0,0.4);
  border: 4px solid #8B7355;
}

#board td{
  width: 90px;
  height: 90px;
  padding: 0;
  margin: 0;
  text-align: center;
  vertical-align: middle;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

#board td:hover{
  filter: brightness(1.1);
}

.light-square{ background: #f0d9b5; }
.dark-square{ background: #b58863; }

.selected{
  background: #FFD700 !important;
  box-shadow: inset 0 0 30px rgba(255,215,0,0.8);
}

.unicode-piece{
  font-size: 60px;
  display: inline-block;
}

.white-piece{
  color: #fff;
  text-shadow: -1px -1px 2px #000, 1px -1px 2px #000, -1px 1px 2px #000, 1px 1px 2px #000;
}

.black-piece{
  color: #222;
  text-shadow: -1px -1px 2px #fff, 1px -1px 2px #fff, -1px 1px 2px #fff, 1px 1px 2px #fff;
}

@media (max-width: 768px){
  #board td{width:50px;height:50px;}
  .unicode-piece{font-size:35px;}
  h1{font-size:1.5em;}
  button{padding:10px 20px;font-size:14px;}
}
</style>
</head>
<body>

<h1>🏛️ History Chess</h1>

<div class="controls">
  <button id="btn-yeni">⚔️ Yeni Oyun</button>
  <button id="btn-svg">🎨 SVG Taşlar</button>
</div>

<div id="status">Beyazın sırası!</div>

<table id="board"></table>

<script>
var W='w',B='b';
var tahta=[];
var secilenKare=null;
var simdikiSira=W;

var UNICODE={
  w:{K:'♚',Q:'♛',R:'♜',B:'♝',N:'♞',P:'♟'},
  b:{K:'♔',Q:'♕',R:'♖',B:'♗',N:'♘',P:'♙'}
};

var tasTipi='unicode';
var SVG_TASLAR={
  roma:{
    K:'icons/roma/king.jpg',
    Q:'icons/roma/queen.jpg',
    R:'icons/roma/rook.jpg',
    B:'icons/roma/bishop.jpg',
    N:'icons/roma/knight.jpg',
    P:'icons/roma/pawn.jpg'
  },
  misir:{
    K:'icons/misir/king.jpg',
    Q:'icons/misir/queen.jpg',
    R:'icons/misir/rook.jpg',
    B:'icons/misir/bishop.jpg',
    N:'icons/misir/knight.jpg',
    P:'icons/misir/pawn.jpg'
  }
};

var beyazUyg='roma';
var siyahUyg='misir';

// INLINE STYLE ile TAM BOYUT!
function tasHTML(tas){
  if(tasTipi==='svg'){
    var uyg=tas.r===W?beyazUyg:siyahUyg;
    if(SVG_TASLAR[uyg]){
      return '<img src="'+SVG_TASLAR[uyg][tas.t]+'" style="width:100%;height:100%;display:block;object-fit:cover;border-radius:4px;" draggable="false">';
    }
  }
  var cls='unicode-piece '+(tas.r===W?'white-piece':'black-piece');
  return '<span class="'+cls+'">'+UNICODE[tas.r][tas.t]+'</span>';
}

function tahtaBaslat(){
  tahta=[];
  for(var i=0;i<8;i++){
    tahta[i]=[];
    for(var j=0;j<8;j++) tahta[i][j]=null;
  }
  
  var sira=['R','N','B','Q','K','B','N','R'];
  for(var j=0;j<8;j++){
    tahta[0][j]={t:sira[j],r:B};
    tahta[1][j]={t:'P',r:B};
    tahta[6][j]={t:'P',r:W};
    tahta[7][j]={t:sira[j],r:W};
  }
  
  simdikiSira=W;
  secilenKare=null;
}

function tahtaCiz(){
  var html='';
  for(var i=0;i<8;i++){
    html+='<tr>';
    for(var j=0;j<8;j++){
      var renk=(i+j)%2===0?'light-square':'dark-square';
      var tas=tahta[i][j];
      var icerik=tas?tasHTML(tas):'';
      html+='<td class="'+renk+'" data-s="'+i+'" data-su="'+j+'">'+icerik+'</td>';
    }
    html+='</tr>';
  }
  document.getElementById('board').innerHTML=html;
  
  var cells=document.querySelectorAll('#board td');
  cells.forEach(function(cell){
    cell.addEventListener('click',function(){
      var s=parseInt(this.getAttribute('data-s'));
      var su=parseInt(this.getAttribute('data-su'));
      kareTiklandi(s,su);
    });
  });
}

function kareTiklandi(s,su){
  var tas=tahta[s][su];
  
  if(secilenKare){
    if(s===secilenKare.s && su===secilenKare.su){
      secilenKare=null;
    }else if(gecerliMi(secilenKare.s,secilenKare.su,s,su)){
      tahta[s][su]=tahta[secilenKare.s][secilenKare.su];
      tahta[secilenKare.s][secilenKare.su]=null;
      simdikiSira=(simdikiSira===W)?B:W;
      secilenKare=null;
      tahtaCiz();
      document.getElementById('status').textContent=(simdikiSira===W?'Beyazın':'Siyahın')+' sırası!';
      return;
    }else{
      secilenKare=null;
    }
  }
  
  if(tas && tas.r===simdikiSira){
    secilenKare={s:s,su:su};
    tahtaCiz();
    var board=document.getElementById('board');
    board.rows[s].cells[su].classList.add('selected');
  }else{
    tahtaCiz();
  }
}

function gecerliMi(s1,su1,s2,su2){
  var tas=tahta[s1][su1];
  var hedef=tahta[s2][su2];
  
  if(!tas) return false;
  if(hedef && hedef.r===tas.r) return false;
  
  var ds=s2-s1;
  var dsu=su2-su1;
  var ads=Math.abs(ds);
  var adsu=Math.abs(dsu);
  
  if(tas.t==='P'){
    if(tas.r===W){
      if(ds===-1 && dsu===0 && !hedef) return true;
      if(s1===6 && ds===-2 && dsu===0 && !hedef && !tahta[5][su1]) return true;
      if(ds===-1 && adsu===1 && hedef) return true;
    }else{
      if(ds===1 && dsu===0 && !hedef) return true;
      if(s1===1 && ds===2 && dsu===0 && !hedef && !tahta[2][su1]) return true;
      if(ds===1 && adsu===1 && hedef) return true;
    }
  }
  if(tas.t==='R') return (ds===0 || dsu===0);
  if(tas.t==='N') return (ads===2 && adsu===1)||(ads===1 && adsu===2);
  if(tas.t==='B') return ads===adsu && ads>0;
  if(tas.t==='Q') return (ds===0||dsu===0||ads===adsu);
  if(tas.t==='K') return ads<=1 && adsu<=1;
  
  return false;
}

function yeniOyun(){
  tahtaBaslat();
  tahtaCiz();
  document.getElementById('status').textContent='Yeni oyun başladı! ⚔️';
  setTimeout(function(){
    document.getElementById('status').textContent='Beyazın sırası!';
  },1500);
}

function svgDegistir(){
  tasTipi=(tasTipi==='unicode')?'svg':'unicode';
  localStorage.setItem('tasTipi',tasTipi);
  
  var btn=document.getElementById('btn-svg');
  if(tasTipi==='svg'){
    btn.textContent='🎨 SVG Taşlar ✓';
    btn.className='active-svg';
  }else{
    btn.textContent='🎨 SVG Taşlar';
    btn.className='';
  }
  
  tahtaCiz();
}

window.onload=function(){
  if(localStorage.getItem('tasTipi')){
    tasTipi=localStorage.getItem('tasTipi');
    if(tasTipi==='svg'){
      document.getElementById('btn-svg').textContent='🎨 SVG Taşlar ✓';
      document.getElementById('btn-svg').className='active-svg';
    }
  }
  
  document.getElementById('btn-yeni').addEventListener('click',yeniOyun);
  document.getElementById('btn-svg').addEventListener('click',svgDegistir);
  
  yeniOyun();
};
</script>

</body>
</html>
